name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repo
        uses: actions/checkout@v3

      - name: 🐳 Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build imagen Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hola-mundo .

      - name: 🚀 Push a Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hola-mundo

      - name: 🔄 Deploy en Render
        run: |
          curl -X POST https://api.render.com/deploy/srv-d7kjgdnaqgkc73bip87g\
          -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
~
